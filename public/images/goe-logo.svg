<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 130" fill="none">
  <defs>
    <linearGradient id="letterGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4db8ff"/>
      <stop offset="40%" stop-color="#1a6fd4"/>
      <stop offset="100%" stop-color="#0d3a8a"/>
    </linearGradient>
    <linearGradient id="globeOuter" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#5ecfff"/>
      <stop offset="50%" stop-color="#2080d0"/>
      <stop offset="100%" stop-color="#0d3a8a"/>
    </linearGradient>
    <radialGradient id="globeInner" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#c8e8ff"/>
      <stop offset="35%" stop-color="#7ec8f5"/>
      <stop offset="70%" stop-color="#3090d8"/>
      <stop offset="100%" stop-color="#1055a8"/>
    </radialGradient>
    <linearGradient id="orbitGrad" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#8ad4ff" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#5bb8f5"/>
      <stop offset="100%" stop-color="#1a6fd4" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#0d3a8a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- G letter -->
  <text x="2" y="108"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900"
    font-size="108"
    fill="url(#letterGrad)"
    filter="url(#shadow)"
    letter-spacing="-2">G</text>

  <!-- E letter -->
  <text x="225" y="108"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900"
    font-size="108"
    fill="url(#letterGrad)"
    filter="url(#shadow)"
    letter-spacing="-2">E</text>

  <!-- Globe body (replaces O) -->
  <circle cx="168" cy="60" r="52" fill="url(#globeOuter)" filter="url(#shadow)"/>
  <circle cx="168" cy="60" r="48" fill="url(#globeInner)"/>

  <!-- Globe grid lines -->
  <ellipse cx="168" cy="60" rx="48" ry="48" stroke="rgba(255,255,255,0.25)" stroke-width="0.8" fill="none"/>
  <ellipse cx="168" cy="60" rx="28" ry="48" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none"/>
  <ellipse cx="168" cy="60" rx="10" ry="48" stroke="rgba(255,255,255,0.15)" stroke-width="0.6" fill="none"/>
  <ellipse cx="168" cy="60" rx="48" ry="20" stroke="rgba(255,255,255,0.2)" stroke-width="0.7" fill="none"/>
  <ellipse cx="168" cy="60" rx="48" ry="36" stroke="rgba(255,255,255,0.15)" stroke-width="0.6" fill="none"/>
  <line x1="120" y1="60" x2="216" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <line x1="168" y1="12" x2="168" y2="108" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>

  <!-- Globe highlight -->
  <ellipse cx="152" cy="38" rx="14" ry="10" fill="rgba(255,255,255,0.22)" transform="rotate(-20 152 38)"/>

  <!-- Orbital ring around globe -->
  <ellipse cx="168" cy="60" rx="62" ry="22"
    stroke="url(#orbitGrad)" stroke-width="3.5" fill="none"
    transform="rotate(-18 168 60)"
    stroke-linecap="round"/>

  <!-- Swoosh under G -->
  <path d="M 8 115 Q 45 128 78 118" stroke="#4db8ff" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Arrow top-right of globe -->
  <line x1="210" y1="22" x2="238" y2="4" stroke="#1a6fd4" stroke-width="3.2" stroke-linecap="round"/>
  <polygon points="238,4 226,8 232,18" fill="#1a6fd4"/>
</svg>
